name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build & push Docker image to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ steps.sha-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Set lowercase sha tag
        id: sha-tag
        run: echo "tag=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):sha-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Terraform: Apply infrastructure changes
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}"

  # ---------------------------------------------------------------------------
  # Deploy API to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API (Azure Container Apps)
    runs-on: ubuntu-latest
    needs: [build-push, terraform-apply]
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set lowercase image tag
        run: echo "IMAGE_TAG=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):sha-${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: rg-homebase
          containerAppName: ca-homebase-prod-api
          imageToDeploy: ${{ env.IMAGE_TAG }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Deploy web to Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HomeBase.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/HomeBase.Web
        run: npm ci

      - name: Build
        working-directory: src/HomeBase.Web
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: src/HomeBase.Web/dist
          output_location: ""
          skip_app_build: true

  # ---------------------------------------------------------------------------
  # Smoke test: verify /health endpoint
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api]

    steps:
      - name: Wait for container app to stabilise
        run: sleep 30

      - name: Health check (liveness)
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --max-time 30 \
            --retry 10 \
            --retry-delay 10 \
            --retry-connrefused \
            "${{ secrets.VITE_API_BASE_URL }}/health/live")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Liveness check failed with status $STATUS"
            exit 1
          fi

      - name: Readiness check
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --max-time 30 \
            --retry 12 \
            --retry-delay 15 \
            --retry-connrefused \
            "${{ secrets.VITE_API_BASE_URL }}/health/ready")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Readiness check failed with status $STATUS — DB may still be waking up"
            exit 1
          fi

      - name: Smoke test passed
        run: echo "Deployment verified. API is live and healthy."
